<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

  <meta name="description" content="Read movie reviews, ratings, and audience reactions on Rately." />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" id="reviewsCanonical" href="https://rately.example.com/html/reviews.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" id="reviewsOgTitle" content="Reviews | Rately" />
  <meta property="og:description" id="reviewsOgDescription" content="Read movie reviews, ratings, and audience reactions on Rately." />
  <meta property="og:url" id="reviewsOgUrl" content="https://rately.example.com/html/reviews.html" />
  <meta property="og:image" id="reviewsOgImage" content="https://rately.example.com/img/logo_croped.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" id="reviewsTwitterTitle" content="Reviews | Rately" />
  <meta name="twitter:description" id="reviewsTwitterDescription" content="Read movie reviews, ratings, and audience reactions on Rately." />
  <meta name="twitter:image" id="reviewsTwitterImage" content="https://rately.example.com/img/logo_croped.png" />
  <link rel="stylesheet" type="text/css"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=DM+Sans:wght@300;400;500;600&amp;display=swap" />
  <link rel="stylesheet" type="text/css" href="../css/styles.css" />
  <link rel="stylesheet" type="text/css" href="../css/reviews.css" />
</head>

<body>

<!-- ════════════════════════════════════════
       SIDEBAR OVERLAY
       ════════════════════════════════════════ -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()">&#160;</div>

  <!-- ════════════════════════════════════════
       SIDEBAR
       ════════════════════════════════════════ -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <span class="sidebar-brand">Rately</span>
      <button class="sidebar-close" onclick="closeSidebar()">&#215;</button>
    </div>
    <span class="sidebar-section">Browse</span>
    <a href="/html/movies.html" class="sidebar-item">&#127916; Movies</a>
    <a href="/html/reviews.html" class="sidebar-item">&#9733; Reviews</a>
    <hr class="sidebar-divider" />
    <span class="sidebar-section">My Rately</span>
    <a href="/html/watchlist.html" class="sidebar-item">&#9997; Watchlist</a>
    <a href="/html/profile.html" class="sidebar-item">&#128100; Profile</a>
    <hr class="sidebar-divider" />
    <a href="/html/advanced_search.html" class="sidebar-item">&#128269; Advanced Search</a>
    <a href="/html/login.xhtml" class="sidebar-item">&#128274; Sign In</a>
  </div>

  <!-- NAVBAR -->
  <nav class="navbar" id="mainNav">
    <a href="/index.html" class="nav-logo">
      <img src="../img/logo_croped.png" alt="Rately" />
      <span class="nav-logo-name">Rately</span>
    </a>

    <ul class="nav-links">
      <li><a href="/html/advanced_search.html" class="nav-item">Movies</a></li>
      <li class="nav-has-dropdown">
        <button class="nav-item nav-dropdown-trigger">Browse <span class="nav-chevron">&#9660;</span></button>
        <div class="nav-dropdown-panel">
          <a href="/html/movies.html?genre=action" class="nav-dropdown-item">Action</a>
          <a href="/html/movies.html?genre=drama" class="nav-dropdown-item">Drama</a>
          <a href="/html/movies.html?genre=comedy" class="nav-dropdown-item">Comedy</a>
          <a href="/html/movies.html?genre=thriller" class="nav-dropdown-item">Thriller</a>
          <a href="/html/movies.html?genre=sci-fi" class="nav-dropdown-item">Sci-Fi</a>
          <a href="/html/movies.html?genre=romance" class="nav-dropdown-item">Romance</a>
          <a href="/html/movies.html?genre=fantasy" class="nav-dropdown-item">Fantasy</a>
        </div>
      </li>
    </ul>

    <form class="nav-search" action="/html/advanced_search.html" method="get">
      <label class="sr-only" for="reviewsNavSearchInput">Search movies or shows</label>
      <input type="text" id="reviewsNavSearchInput" name="search" placeholder="Search movies, shows…" />
      <button type="submit" class="nav-search-btn">Search</button>
    </form>

    <div class="nav-right">
      <a href="/html/watchlist.html" class="nav-watchlist-link">
        Watchlist <span class="nav-badge" id="navWlBadge"></span>
      </a>
      <a href="/html/profile.html" class="nav-avatar-btn" id="navAvatar">B</a>
      <a href="/html/login.xhtml" class="nav-signin-btn">Sign In</a>
    </div>

    <button class="nav-hamburger" onclick="openSidebar()">&#9776;</button>
  </nav>


<div class="page">

  <h1 id="reviewsPageTitle">Reviews</h1>

  <!-- Movie summary -->
  <div class="movie-summary">

    <div class="movie-card">
      <img id="reviewsPoster" src="../img/landscape_princess_khutulun_poster.jpeg" alt="Movie Poster" />
    </div>

    <div class="movie-summary-content">
      <div class="movie-info-title" id="reviewsMovieTitle">&#8220;Movie Title&#8221;</div>
      <div class="movie-info">

        <!-- Watched toggle -->
        <div class="toggle-row">
          <label class="toggle">
            <input type="checkbox" id="reviewsWatchedToggle" />
            <span class="toggle-track">&#160;</span>
            <span class="toggle-thumb">&#160;</span>
          </label>
          <span>Mark as watched</span>
        </div>

        <!-- Rating -->
        <div class="rating-row">
          <span class="star">&#9733;</span>
          <span id="reviewsMovieRating">0.0</span>
          <span class="count" id="reviewsMovieCount">(0)</span>
        </div>

        <!-- Action links -->
        <div class="movie-info-actions">
          <button class="info-link" id="reviewsWatchlistBtn" type="button">Add to Your Watchlist</button>
          <a class="info-link" id="reviewsBackToMovie" href="movie_details.html">Rate and Review</a>
        </div>

      </div>
    </div>

  </div>

  <!-- Review list -->
  <div class="reviews-list" id="reviewsList" aria-live="polite"></div>

</div>

<script type="text/javascript">
    function openSidebar() {
      document.getElementById('sidebar').className = 'sidebar open';
      document.getElementById('sidebarOverlay').className = 'sidebar-overlay open';
    }
    function closeSidebar() {
      document.getElementById('sidebar').className = 'sidebar';
      document.getElementById('sidebarOverlay').className = 'sidebar-overlay';
    }
  </script>
  <script type="module" src="/js/reviews-page.js"></script>
  <script src="/js/navbar.js"></script>

</body>
</html>
