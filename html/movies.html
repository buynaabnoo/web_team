<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movies</title>
  <link rel="stylesheet" type="text/css"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=DM+Sans:wght@300;400;500;600&amp;display=swap" />
  <link rel="stylesheet" type="text/css" href="../css/styles.css" />
  <link rel="stylesheet" type="text/css" href="../css/movies.css" />
</head>

<body>

  <!-- Sidebar overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()">&#160;</div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <button class="sidebar-close" onclick="closeSidebar()">&#215;</button>
    <a href="#" class="sidebar-item">&#128269; Advanced Search</a>
    <hr class="sidebar-divider" />
    <a href="#" class="sidebar-item">&#128100; Profile</a>
    <a href="watchlist.html" class="sidebar-item">&#10003; Watchlist</a>
  </div>

  <!-- Navbar -->
  <div class="navbar">
    <a href="/index.html" class="nav-logo">
      <img src="/img/logo.png" alt="Cinema Production logo" />
      <span class="nav-logo-name">Rately</span>
    </a>
    <button class="nav-menu-btn" onclick="openSidebar()">
      <span>&#9776;</span> Menu
    </button>
    <form action="/html/movies.html" method="get" style="flex: 1;">
      <div class="nav-search">
        <input type="text" name="search" />
        <a href="./advanced_search.html" class="nav-search-filter">All &#9650;</a>
      </div>
    </form>
    <div class="nav-right">
      <a href="#" class="nav-profile-btn">Profile</a>
      <a href="watchlist.html" class="nav-link">Watchlist</a>
      <button class="nav-lang">ENG</button>
    </div>
  </div>

  <!-- Main content -->
  <div class="page">

    <h1>Movies</h1>

    <!-- Filter buttons — JS-ээр дүүргэнэ -->
    <div class="filter-bar" id="filter-bar"></div>

    <!-- Result info -->
    <div class="result-info" id="result-info"></div>

    <!-- Movies grid — JS-ээр дүүргэнэ -->
    <div class="movies-grid" id="movies-grid"></div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="/index.html" class="footer-logo">
      <img src="/img/logo.png" alt="Cinema Production logo" />
      <span class="footer-logo-name">Rately</span>
    </a>
    <div class="footer-links">
      <a href="/index.html" class="footer-link">Home</a>
      <a href="watchlist.html" class="footer-link">Watchlist</a>
    </div>
  </div>

  <!-- JavaScript -->
  <script type="text/javascript">
    //<![CDATA[
    function openSidebar() {
      document.getElementById('sidebar').className = 'sidebar open';
      document.getElementById('sidebarOverlay').className = 'sidebar-overlay open';
    }
    function closeSidebar() {
      document.getElementById('sidebar').className = 'sidebar';
      document.getElementById('sidebarOverlay').className = 'sidebar-overlay';
    }
    //]]>
  </script>
  <script type="text/javascript" src="/js/movies-page.js"></script>
  
</body>
</html>
