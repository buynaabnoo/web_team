<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<title>Movie Review Profile</title>
<link rel="stylesheet" type="text/css" href="../css/profile.css" />
</head>

<body>

    <div class="profile-header">

  <div class="profile-left">
      <img src="../web_team/web_team/img/image profile/1-intro-photo-final.jpg" class="profile-img">

      <div class="profile-info">
          <h1>Buynaa</h1>
          <p>Movie lover</p>

          <div class="stats">
              <span><b>45</b> Reviews</span>
              <span><b>120</b> Ratings</span>
              <span><b>32</b> Followers</span>
          </div>
      </div>
  </div>

  <div class="profile-actions">
      <button class="btn edit">Edit Profile</button>
      <button class="btn follow">Follow</button>
      <button class="btn message">Message</button>
  </div>

</div>



<div class="reviews">

<h2>My Reviews</h2>

<div class="review-card">
<img src="../web_team/web_team/img/image profile/image1.jpg" alt="movie"/>
<div>
<h4>Эхиймаа</h4>
<p>⭐ 9/10</p>
<p>Amazing story and visuals.</p>
</div>
</div>

<div class="review-card">
<img src="../web_team/web_team/img/image profile/image2.jpg" alt="movie"/>
<div>
<h4>1990</h4>
<p>⭐ 8/10</p>
<p>Emotional sci-fi masterpiece.</p>
</div>
</div>

</div>


<div class="watchlist">

<h2>Watchlist</h2>

<div class="movie-grid">
<img src="../web_team/web_team/img/image profile/image3.jpg" alt="movie"/>
<img src="../web_team/web_team/img/image profile/image4.jpg" alt="movie"/>
<img src="../web_team/web_team/img/image profile/image5.jpg" alt="movie"/>
<img src="../web_team/web_team/img/image profile/image6.jpg" alt="movie"/>
<img src="../web_team/web_team/img/image profile/image9.jpg" alt="movie">
</div>

</div>

</div>

</body>
</html>
