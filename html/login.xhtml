<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html
  PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <title>Login - Rately</title>

  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=DM+Sans:wght@300;400;500;600&amp;display=swap" />

  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/login.css" />

</head>

<body>

  <div class="login-container">

    <div class="login-card">

      <div class="login-logo">
        <img src="../img/logo_croped.png" alt="logo" />
        <h1>Rately</h1>
      </div>

      <h2>Sign in</h2>

      <form>

        <label>Email</label>
        <input type="email" placeholder="Enter your email" required="required" />

        <label>Password</label>
        <input type="password" placeholder="Enter password" required="required" />

        <button type="submit" class="login-btn">Login</button>

      </form>

      <div class="login-extra">
        <p>Don't have an account?</p>
        <a href="#">Register</a>
      </div>

    </div>

  </div>

</body>

</html>
